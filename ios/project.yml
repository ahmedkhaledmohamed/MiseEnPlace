name: MiseEnPlace
options:
  bundleIdPrefix: com.ahmedkhaledmohamed
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "VMXQN9K3P2"
    CODE_SIGN_STYLE: Automatic

targets:
  MiseEnPlace:
    type: application
    platform: iOS
    sources:
      - path: MiseEnPlace/App
      - path: MiseEnPlace/Models
      - path: MiseEnPlace/Views
      - path: MiseEnPlace/Services
      - path: MiseEnPlace/Resources
        buildPhase: resources
    info:
      path: MiseEnPlace/Info.plist
      properties:
        CFBundleName: Potluck
        CFBundleDisplayName: Potluck
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CFBundleIconName: AppIcon
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Dark
